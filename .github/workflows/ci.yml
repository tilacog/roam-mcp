name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: just ci (fmt, clippy, test, CRAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # llvm-tools-preview is required by cargo-llvm-cov for coverage.
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov,cargo-crap

      - name: Run CI
        run: just ci

  emacs-tests:
    name: Emacs reads Rust-populated DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Emacs and org-roam
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y emacs-nox

          # Isolate CI package state from any pre-existing ~/.emacs.d.
          export EMACS_USER_DIR="$PWD/.ci-emacs.d"
          mkdir -p "$EMACS_USER_DIR/elpa"

          # Install org-roam from MELPA into the isolated directory.
          emacs --batch \
                --no-window-system \
                --eval "(setq user-emacs-directory \"$EMACS_USER_DIR/\")" \
                --eval "(setq package-user-dir (expand-file-name \"elpa\" user-emacs-directory))" \
                --eval "(require 'package)" \
                --eval "(add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)" \
                --eval "(package-initialize)" \
                --eval "(package-refresh-contents)" \
                --eval "(package-install 'org-roam)"

          # Verify org-roam is actually loadable from that directory.
          emacs --batch \
                --no-window-system \
                --eval "(setq user-emacs-directory \"$EMACS_USER_DIR/\")" \
                --eval "(setq package-user-dir (expand-file-name \"elpa\" user-emacs-directory))" \
                --eval "(require 'package)" \
                --eval "(package-initialize)" \
                --eval "(require 'org-roam)" \
                --eval "(princ \"org-roam-loadable\")"

      - name: Run Emacs integration tests
        run: |
          # Make the CI-installed org-roam discoverable to the test probe.
          export EMACS_USER_DIR="$PWD/.ci-emacs.d"
          export HOME="$PWD"
          cargo test --features emacs-tests --test emacs_populator_roundtrip -- --nocapture

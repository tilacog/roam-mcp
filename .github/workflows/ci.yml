name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: just ci (fmt, clippy, test, CRAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # llvm-tools-preview is required by cargo-llvm-cov for coverage.
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: just,cargo-llvm-cov,cargo-crap

      - name: Run CI
        run: just ci

  emacs-tests:
    name: Emacs reads Rust-populated DB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install Emacs and org-roam
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs-nox
          emacs --batch --eval "
            (require 'package)
            (add-to-list 'package-archives '(\"melpa\" . \"https://melpa.org/packages/\") t)
            (package-initialize)
            (package-refresh-contents)
            (package-install 'org-roam)
          "

      - name: Run Emacs integration tests
        run: cargo test --features emacs-tests --test emacs_populator_roundtrip -- --nocapture
